name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  nix-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Run nix flake check
        run: |
          set -euo pipefail

          cpu_count=$(nproc)
          mem_mib=$(awk '/MemTotal:/ { print int($2 / 1024) }' /proc/meminfo)
          if [ -r /sys/fs/cgroup/memory.max ]; then
            cgroup_memory_max=$(cat /sys/fs/cgroup/memory.max)
            if [ "$cgroup_memory_max" != "max" ]; then
              cgroup_mem_mib=$((cgroup_memory_max / 1024 / 1024))
              if [ "$cgroup_mem_mib" -gt 0 ] && [ "$cgroup_mem_mib" -lt "$mem_mib" ]; then
                mem_mib=$cgroup_mem_mib
              fi
            fi
          fi

          reserved_cpu=1
          reserved_mem_mib=2048
          mib_per_job=8192

          usable_cpu=$((cpu_count - reserved_cpu))
          if [ "$usable_cpu" -lt 1 ]; then
            usable_cpu=1
          fi

          usable_mem_mib=$((mem_mib - reserved_mem_mib))
          if [ "$usable_mem_mib" -lt "$mib_per_job" ]; then
            usable_mem_mib=$mib_per_job
          fi

          jobs_by_cpu=$usable_cpu
          jobs_by_mem=$((usable_mem_mib / mib_per_job))
          max_jobs=$jobs_by_cpu
          if [ "$jobs_by_mem" -lt "$max_jobs" ]; then
            max_jobs=$jobs_by_mem
          fi
          if [ "$max_jobs" -lt 1 ]; then
            max_jobs=1
          fi

          cores=$((usable_cpu / max_jobs))
          if [ "$cores" -lt 1 ]; then
            cores=1
          fi

          echo "Detected ${cpu_count} CPUs and ${mem_mib} MiB memory"
          echo "Running Nix validation with --max-jobs ${max_jobs} --cores ${cores}"

          heartbeat_tick=0
          while true; do
            sleep 60
            heartbeat_tick=$((heartbeat_tick + 1))
            available_mem_mib=$(awk '/MemAvailable:/ { print int($2 / 1024) }' /proc/meminfo)
            load_avg=$(cut -d' ' -f1-3 /proc/loadavg)
            echo "CI heartbeat: Nix validation still running; load=${load_avg}; available_mem_mib=${available_mem_mib}"
            if [ "$available_mem_mib" -lt 512 ] || [ $((heartbeat_tick % 5)) -eq 0 ]; then
              ps -eo pid,ppid,comm,%cpu,%mem,rss,args --sort=-rss | head -n 8
            fi
          done &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          checks=(
            lambda-health-check
            nixos-module-performance
            nixos-vm-test-adaptive-tuning
            nixos-vm-test-backend
            nixos-vm-test-basic
            nixos-vm-test-compliance
            nixos-vm-test-eviction-lfu
            nixos-vm-test-eviction-lru
            nixos-vm-test-filtered-bundles
            nixos-vm-test-ghe-key-lookup-keyring
            nixos-vm-test-keyring-creds
            nixos-vm-test-pack-cache
            nixos-vm-test-secrets-aws
            nixos-vm-test-secrets-sops
            nixos-vm-test-ssh-authz
            nixos-vm-test-ssh-large-lsrefs
            nixos-vm-test-startup-init-failure
            terraform-config-sync
            treefmt
          )

          expected_checks=$(printf '%s\n' "${checks[@]}" | sort | paste -sd, -)
          actual_checks=$(nix eval --raw .#checks.x86_64-linux --apply \
            'checks: builtins.concatStringsSep "," (builtins.sort builtins.lessThan (builtins.attrNames checks))')
          if [ "$actual_checks" != "$expected_checks" ]; then
            echo "Check list is stale"
            echo "expected: $expected_checks"
            echo "actual:   $actual_checks"
            exit 1
          fi

          for check in "${checks[@]}"; do
            echo "Building checks.x86_64-linux.${check}"
            nix build --quiet --no-link --max-jobs "$max_jobs" --cores "$cores" ".#checks.x86_64-linux.${check}"
            echo "✅ checks.x86_64-linux.${check}"
          done
