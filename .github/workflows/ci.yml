name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  nix-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          flakehub: false
      - name: Run nix flake check
        run: |
          set -euo pipefail

          cpu_count=$(nproc)
          mem_mib=$(awk '/MemTotal:/ { print int($2 / 1024) }' /proc/meminfo)
          if [ -r /sys/fs/cgroup/memory.max ]; then
            cgroup_memory_max=$(cat /sys/fs/cgroup/memory.max)
            if [ "$cgroup_memory_max" != "max" ]; then
              cgroup_mem_mib=$((cgroup_memory_max / 1024 / 1024))
              if [ "$cgroup_mem_mib" -gt 0 ] && [ "$cgroup_mem_mib" -lt "$mem_mib" ]; then
                mem_mib=$cgroup_mem_mib
              fi
            fi
          fi

          reserved_cpu=1
          reserved_mem_mib=2048
          mib_per_job=8192

          usable_cpu=$((cpu_count - reserved_cpu))
          if [ "$usable_cpu" -lt 1 ]; then
            usable_cpu=1
          fi

          usable_mem_mib=$((mem_mib - reserved_mem_mib))
          if [ "$usable_mem_mib" -lt "$mib_per_job" ]; then
            usable_mem_mib=$mib_per_job
          fi

          jobs_by_cpu=$usable_cpu
          jobs_by_mem=$((usable_mem_mib / mib_per_job))
          max_jobs=$jobs_by_cpu
          if [ "$jobs_by_mem" -lt "$max_jobs" ]; then
            max_jobs=$jobs_by_mem
          fi
          if [ "$max_jobs" -lt 1 ]; then
            max_jobs=1
          fi

          cores=$((usable_cpu / max_jobs))
          if [ "$cores" -lt 1 ]; then
            cores=1
          fi

          echo "Detected ${cpu_count} CPUs and ${mem_mib} MiB memory"
          echo "Running nix flake check with --max-jobs ${max_jobs} --cores ${cores}"

          heartbeat_tick=0
          while true; do
            sleep 60
            heartbeat_tick=$((heartbeat_tick + 1))
            available_mem_mib=$(awk '/MemAvailable:/ { print int($2 / 1024) }' /proc/meminfo)
            load_avg=$(cut -d' ' -f1-3 /proc/loadavg)
            echo "CI heartbeat: nix flake check still running; load=${load_avg}; available_mem_mib=${available_mem_mib}"
            if [ "$available_mem_mib" -lt 512 ] || [ $((heartbeat_tick % 5)) -eq 0 ]; then
              ps -eo pid,ppid,comm,%cpu,%mem,rss,args --sort=-rss | head -n 8
            fi
          done &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          nix flake check --quiet --max-jobs "$max_jobs" --cores "$cores"
