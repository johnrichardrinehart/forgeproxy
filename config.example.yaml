config_reload:
  enabled: true
  interval_secs: 60
upstream:
  hostname: "ghe.internal.example.com"
  api_url: "https://ghe.internal.example.com/api/v3"
  git_url_base: "https://ghe.internal.example.com"
  admin_token_env: "FORGE_ADMIN_TOKEN"
  api_rate_limit_buffer: 100
upstream_credentials:
  default_mode: "pat"
  orgs:
    "acme-corp":
      mode: "pat"
      keyring_key_name: "pat-acme"
    "defense-org":
      mode: "ssh"
      keyring_key_name: "ssh-key-defense"
    "public-org":
      mode: "pat"
      keyring_key_name: "pat-public"
proxy:
  ssh_listen: "0.0.0.0:2222"
  http_listen: "127.0.0.1:8080"
valkey:
  endpoint: "valkey.internal.example.com:6380"
  tls: true
  auth_token_env: "VALKEY_AUTH_TOKEN"
auth:
  ssh_cache_ttl: 300
  http_cache_ttl: 120
  negative_cache_ttl: 60
clone:
  lock_ttl: 60
  lock_wait_timeout: 120
  max_concurrent_upstream_clones: 5
  max_concurrent_upstream_fetches: 10
  reserved_request_time_upstream_fetches: 2
  # Request path: every local disk serve acquires these before spawning git upload-pack.
  # Higher values improve parallel clone/fetch throughput but allow more concurrent pack-objects CPU.
  max_concurrent_local_upload_packs: 4
  max_concurrent_local_upload_packs_per_repo: 1
  # Request path: local git upload-pack inherits this as pack.threads for pack generation.
  local_upload_pack_threads: 2
  # Request-adjacent CPU: tee imports and pack-cache indexing use this git index-pack thread cap.
  # It does not gate cache-hit replay, but request-generated artifacts can index while clients are active.
  index_pack_threads: 2
  max_concurrent_tee_captures: 8
  max_concurrent_tee_captures_per_repo_per_instance: 2
  prepare_published_generation_indexes: false
  generation_coalescing_window_secs: 60
  # Coarse worst-case request-path budget before proxying upstream. Zero disables it.
  global_short_circuit_upstream_secs: 0
  request_wait_for_local_catch_up_secs: 30
  # Request path: when a same-repo local catch-up is already running, wait longer
  # for that work instead of stampeding into more full upstream proxy streams.
  request_wait_for_active_local_catch_up_secs: 360
  # Stage-specific request-path budgets. Zero disables each stage-specific budget.
  request_time_s3_restore_secs: 0
  generation_publish_secs: 0
  local_upload_pack_first_byte_secs: 0
  tee_cleanup_interval_secs: 60
  tee_retention_secs: 900
fetch_schedule:
  default_interval: 1800
  delta_threshold: 1024
  backoff_factor: 2
  max_interval: 86400
  rolling_window: 1800
bundles:
  min_clone_count_for_bundles: 2
  bundle_lock_ttl: 300
  # Optional. Defaults to available parallelism divided by max_concurrent_generations.
  # Used for bundle generation, background bitmap/MIDX preparation, and request-time pack-cache deltas.
  pack_threads: 4
  generate_filtered_bundles: true
  max_incremental_bundles: 1
pack_cache:
  enabled: true
  max_percent: 0.20
  high_water_mark: 0.90
  low_water_mark: 0.75
  eviction_policy: "lru"
  wait_for_inflight_secs: 120
  on_demand_composite_total_secs: 0
  request_delta_pack_secs: 0
  max_concurrent_request_deltas: 1
  max_concurrent_background_warmings: 1
  min_response_bytes: 67108864
prewarm:
  enabled: false
  repos: []
  max_concurrent: 2
  force_open_secs: 1500
storage:
  local:
    path: "/var/cache/forgeproxy"
    max_percent: 0.80
    high_water_mark: 0.90
    low_water_mark: 0.75
    eviction_policy: "lfu"
  s3:
    bucket: "forgeproxy-bundles"
    prefix: ""
    region: "us-east-1"
    use_fips: false
    presigned_url_ttl: 60
observability:
  metrics:
    prometheus:
      enabled: true
      refresh_interval_secs: 60
  logs:
    journald:
      enabled: true
  traces:
    enabled: false
    sample_ratio: 1.0
logging:
  level: "info"
delegated_repositories:
  # Repositories listed here are always delegated to the upstream forge and do
  # not use local disk, pack-cache, bundle-uri, or tee-hydration paths.
  - "org/problem-repo"
repo_overrides:
  "org/monorepo":
    fetch_interval: 900
    disable_bundles: false
