upstream:
  hostname: "ghe.internal.example.com"
  api_url: "https://ghe.internal.example.com/api/v3"
  git_url_base: "https://ghe.internal.example.com"
  admin_token_env: "FORGE_ADMIN_TOKEN"
  api_rate_limit_buffer: 100
upstream_credentials:
  default_mode: "pat"
  orgs:
    "acme-corp":
      mode: "pat"
      keyring_key_name: "pat-acme"
    "defense-org":
      mode: "ssh"
      keyring_key_name: "ssh-key-defense"
    "public-org":
      mode: "pat"
      keyring_key_name: "pat-public"
proxy:
  ssh_listen: "0.0.0.0:2222"
  http_listen: "127.0.0.1:8080"
valkey:
  endpoint: "valkey.internal.example.com:6380"
  tls: true
  auth_token_env: "VALKEY_AUTH_TOKEN"
auth:
  ssh_cache_ttl: 300
  http_cache_ttl: 120
  negative_cache_ttl: 60
clone:
  lock_ttl: 60
  lock_wait_timeout: 120
  max_concurrent_upstream_clones: 5
  max_concurrent_upstream_fetches: 10
  reserved_request_time_upstream_fetches: 2
  max_concurrent_local_upload_packs: 4
  max_concurrent_local_upload_packs_per_repo: 1
  max_concurrent_tee_captures: 8
  max_concurrent_tee_captures_per_repo_per_instance: 2
  prepare_published_generation_indexes: false
  generation_coalescing_window_secs: 60
  request_wait_for_local_catch_up_secs: 30
  tee_cleanup_interval_secs: 60
  tee_retention_secs: 900
fetch_schedule:
  default_interval: 1800
  delta_threshold: 1024
  backoff_factor: 2
  max_interval: 86400
  rolling_window: 1800
bundles:
  min_clone_count_for_bundles: 2
  bundle_lock_ttl: 300
  # Optional. Defaults to available parallelism divided by max_concurrent_generations.
  # Set explicitly to bound CPU used by bundle and bitmap/MIDX generation.
  pack_threads: 4
  generate_filtered_bundles: true
  max_incremental_bundles: 1
pack_cache:
  enabled: true
  max_percent: 0.20
  ttl_secs: 900
  wait_for_inflight_secs: 120
  min_response_bytes: 67108864
storage:
  local:
    path: "/var/cache/forgeproxy"
    max_bytes: 536870912000
    high_water_mark: 0.90
    low_water_mark: 0.75
    eviction_policy: "lfu"
  s3:
    bucket: "forgeproxy-bundles"
    prefix: ""
    region: "us-east-1"
    use_fips: false
    presigned_url_ttl: 60
observability:
  metrics:
    prometheus:
      enabled: true
      refresh_interval_secs: 60
  logs:
    journald:
      enabled: true
  traces:
    enabled: false
    sample_ratio: 1.0
logging:
  level: "info"
repo_overrides:
  "org/monorepo":
    fetch_interval: 900
    disable_bundles: false
