config_reload:
  enabled: true
  interval_secs: 60
background_work:
  enabled: true
  defer_when_active_clones: true
  # Point-in-time CPU pressure sampled over approximately 100ms.
  cpu_busy_100ms_high_watermark: 0.80
  # One-minute load average divided by cgroup-aware CPU budget.
  load_1m_per_cpu_high_watermark: 0.80
  retry_interval_secs: 60
  max_defer_retries: 10
  max_defer_secs: 1800
adaptive_tuning:
  enabled: false
  # active applies recommendations, shadow records what the controller would do,
  # disabled ignores the controller even if enabled is true.
  mode: "active"
  evaluation_interval_secs: 60
  cpu_poll_interval_secs: 10
  warmup_interval_secs: 300
  min_sample_count: 20
  recommendation_ttl_secs: 300
  recommendation_max_staleness_secs: 300
  slo:
    clone_latency_secs: 30.0
    first_byte_latency_secs: 5.0
    fallback_rate: 0.05
  resource_pressure:
    cpu_busy_high_watermark: 0.85
    disk_busy_high_watermark: 0.85
    memory_available_min_percent: 10.0
  bounds:
    upstream_clone_concurrency: {min: 1, max: 16, max_increase_step: 1, max_decrease_step: 2}
    upstream_fetch_concurrency: {min: 1, max: 32, max_increase_step: 1, max_decrease_step: 2}
    upstream_clone_per_repo_per_instance: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    upstream_clone_per_repo_across_instances: {min: 1, max: 32, max_increase_step: 1, max_decrease_step: 2}
    tee_capture_concurrency: {min: 1, max: 16, max_increase_step: 1, max_decrease_step: 2}
    tee_capture_per_repo: {min: 1, max: 4, max_increase_step: 1, max_decrease_step: 1}
    local_upload_pack_concurrency: {min: 1, max: 16, max_increase_step: 1, max_decrease_step: 2}
    local_upload_pack_per_repo: {min: 1, max: 4, max_increase_step: 1, max_decrease_step: 1}
    deep_validation_concurrency: {min: 1, max: 4, max_increase_step: 1, max_decrease_step: 1}
    prewarm_concurrency: {min: 1, max: 16, max_increase_step: 1, max_decrease_step: 2}
    bundle_generation_concurrency: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    pack_cache_request_delta_concurrency: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    pack_cache_background_warming_concurrency: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    bundle_pack_threads: {min: 1, max: 16, max_increase_step: 1, max_decrease_step: 2}
    local_upload_pack_threads: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    index_pack_threads: {min: 1, max: 8, max_increase_step: 1, max_decrease_step: 2}
    request_wait_for_local_catch_up_secs: {min: 0, max: 300, max_increase_step: 5, max_decrease_step: 10}
    request_time_s3_restore_secs: {min: 0, max: 600, max_increase_step: 5, max_decrease_step: 10}
    generation_publish_secs: {min: 0, max: 600, max_increase_step: 5, max_decrease_step: 10}
    local_upload_pack_first_byte_secs: {min: 0, max: 120, max_increase_step: 2, max_decrease_step: 5}
upstream:
  hostname: "ghe.internal.example.com"
  api_url: "https://ghe.internal.example.com/api/v3"
  git_url_base: "https://ghe.internal.example.com"
  admin_token_env: "FORGE_ADMIN_TOKEN"
  api_rate_limit_buffer: 100
  log_secret_unmask_chars: 4
  key_lookup_url: null
backend_type: "github-enterprise"
upstream_credentials:
  default_mode: "pat"
  orgs:
    "acme-corp":
      mode: "pat"
      keyring_key_name: "pat-acme"
    "defense-org":
      mode: "ssh"
      keyring_key_name: "ssh-key-defense"
    "public-org":
      mode: "pat"
      keyring_key_name: "pat-public"
proxy:
  ssh_listen: "0.0.0.0:2222"
  http_listen: "127.0.0.1:8080"
valkey:
  endpoint: "valkey.internal.example.com:6380"
  tls: true
  ca_cert_file: null
  auth_token_env: "VALKEY_AUTH_TOKEN"
auth:
  ssh_user_lookup_cache_ttl: 30
  ssh_repo_access_cache_ttl: 30
  http_cache_ttl: 120
  negative_cache_ttl: 60
  webhook_secret_env: "FORGE_WEBHOOK_SECRET"
clone:
  lock_ttl: 60
  lock_wait_timeout: 120
  max_concurrent_upstream_clones: 5
  max_concurrent_upstream_fetches: 10
  reserved_request_time_upstream_fetches: 2
  max_concurrent_upstream_clones_per_repo_across_instances: 10
  max_concurrent_upstream_clones_per_repo_per_instance: 3
  # Request path: every local disk serve acquires these before spawning git upload-pack.
  # Higher values improve parallel clone/fetch throughput but allow more concurrent pack-objects CPU.
  max_concurrent_local_upload_packs: 4
  max_concurrent_local_upload_packs_per_repo: 1
  # Request path: local git upload-pack inherits this as pack.threads for pack generation.
  local_upload_pack_threads: 2
  # Request-adjacent CPU: tee imports and pack-cache indexing use this git index-pack thread cap.
  # It does not gate cache-hit replay, but request-generated artifacts can index while clients are active.
  index_pack_threads: 2
  max_concurrent_tee_captures: 8
  max_concurrent_tee_captures_per_repo_per_instance: 2
  max_concurrent_deep_validations: 1
  hydration_mode: "publish_from_capture"
  prepare_published_generation_midx: true
  published_generation_bitmap_policy: "adaptive"
  published_generation_bitmap_min_mirror_size_bytes: 524288000
  published_generation_bitmap_churn_bytes_threshold: 52428800
  published_generation_bitmap_max_interval_ratio: 0.5
  generation_coalescing_window_secs: 60
  # Coarse worst-case request-path budget before proxying upstream. Zero disables it.
  global_short_circuit_upstream_secs: 0
  request_wait_for_local_catch_up_secs: 30
  # Request path: when a same-repo local catch-up is already running, wait longer
  # for that work instead of stampeding into more full upstream proxy streams.
  request_wait_for_active_local_catch_up_secs: 360
  # Stage-specific request-path budgets. Zero disables each stage-specific budget.
  request_time_s3_restore_secs: 0
  generation_publish_secs: 0
  local_upload_pack_first_byte_secs: 0
  tee_cleanup_interval_secs: 60
  tee_retention_secs: 900
  ssh_upload_pack_close_grace_secs: 5
fetch_schedule:
  enabled: true
  evaluation_interval_secs: 30
  min_interval_secs: 300
  max_interval_secs: 86400
  candidate_limit_per_tick: 128
  max_refreshes_per_tick: 16
  request_probability_window_secs: 900
  churn_window_secs: 1800
  stale_after_secs: 1800
  jitter_percent: 15
# Deploy-time defaults for how an already-cached mirror is refreshed before a
# new published generation is materialized. In `auto`, forgeproxy combines
# these defaults with learned per-repo state stored in Valkey, such as observed
# mirror size, ref count, failure score, and prior alternates failures.
#
# Terraform/config deploys overwrite only this default policy and explicit
# repo_overrides. They do not erase the learned Valkey state, so a repo can
# keep selecting direct_mirror at runtime even when this default remains auto.
# The auto-mode direct_mirror condition is any-of: mirror size >= size
# threshold, OR ref count >= ref threshold, OR learned failure score >= score
# threshold. delta_workspace_max_physical_ratio is a delta-path health limit:
# a temporary workspace using more than this fraction of the mirror's physical
# disk usage is treated as evidence that the workspace is no longer cheap. The
# runtime ignores this ratio for tiny mirrors where fixed Git overhead dominates.
repo_update:
  mode: "auto"
  large_repo_size_bytes_threshold: 1073741824
  large_repo_ref_count_threshold: 10000
  failure_score_threshold: 3
  delta_workspace_max_physical_ratio: 0.25
bundles:
  min_clone_count_for_bundles: 2
  bundle_lock_ttl: 300
  max_concurrent_generations: 2
  # Optional. Defaults to available parallelism divided by max_concurrent_generations.
  # Used for bundle generation, background bitmap/MIDX preparation, and request-time pack-cache deltas.
  pack_threads: 4
  generate_filtered_bundles: true
  max_incremental_bundles: 1
pack_cache:
  enabled: true
  max_percent: 0.20
  high_water_mark: 0.90
  low_water_mark: 0.75
  eviction_policy: "lru"
  wait_for_inflight_secs: 120
  on_demand_composite_total_secs: 0
  request_delta_pack_secs: 0
  max_concurrent_request_deltas: 1
  max_concurrent_background_warmings: 1
  min_response_bytes: 67108864
  recent_entry_max_age_secs: 21600
  max_recent_repos: 2048
prewarm:
  enabled: false
  repos: []
  max_concurrent: 2
  force_open_secs: 1500
health:
  check_timeout_secs: 5
  disk_min_available_percent: 5.0
storage:
  local:
    path: "/var/cache/forgeproxy"
    max_percent: 0.80
    high_water_mark: 0.90
    low_water_mark: 0.75
    eviction_policy: "lfu"
  s3:
    bucket: "forgeproxy-bundles"
    prefix: ""
    region: "us-east-1"
    endpoint: null
    use_fips: false
    presigned_url_ttl: 60
observability:
  metrics:
    # Pack-cache histograms keep per-repo labels only for the top N heaviest
    # mirrored repositories; all other repos are labeled owner_repo="other".
    top_heavy_repo_limit: 100
    prometheus:
      enabled: true
      refresh_interval_secs: 60
  logs:
    journald:
      enabled: true
  traces:
    enabled: false
    sample_ratio: 1.0
logging:
  level: "info"
delegated_repositories:
  # Repositories listed here are always delegated to the upstream forge and do
  # not use local disk, pack-cache, bundle-uri, or tee-hydration paths.
  - "org/problem-repo"
repo_overrides:
  "org/monorepo":
    fetch_interval: 900
    disable_bundles: false
    # Per-repo overrides are sparse. Omit repo_update entirely to inherit the
    # global defaults above while still allowing learned state to steer auto.
    # Set mode to direct_mirror or delta_workspace only when operator knowledge
    # should override the runtime classifier for this repo.
    repo_update:
      mode: "direct_mirror"
      large_repo_size_bytes_threshold: 1073741824
      large_repo_ref_count_threshold: 5000
      failure_score_threshold: 3
      delta_workspace_max_physical_ratio: 0.25
